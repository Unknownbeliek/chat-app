<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatApp</title>
    <style>
      /* From Uiverse.io by adamgiebl */
      input {
        margin: 10px;
      }
      .input-wrapper input {
        background-color: #eee;
        border: none;
        padding: 1rem;
        font-size: 1rem;
        width: 17em;
        border-radius: 1rem;
        color: lightcoral;
        box-shadow: 0 0.4rem #dfd9d9;
        cursor: pointer;
      }

      .input-wrapper input:focus {
        outline-color: lightcoral;
      }
      /* From Uiverse.io by chase2k25 */
      .button {
        display: inline-flex;
        align-items: center;
        padding: 10px 20px;
        background-color: #fefefe;
        border: 1px solid #dcdcdc;
        border-radius: 12px;
        margin: 20px;
        font-family: "Ubuntu", sans-serif;
        font-size: 16px;
        font-weight: bold;
        color: #333;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        z-index: 0;
        outline: 2px solid #fafafa;
        box-shadow:
          9px 9px 44px #cecece3a,
          -9px -9px 44px #d3d3d33d,
          inset 0 0 0 2px rgba(192, 192, 192, 0.25);
      }

      .button::before {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        right: 3px;
        bottom: 3px;
        border-radius: 30px;
        background: linear-gradient(
          0deg,
          #fbfbfb 0%,
          #fafafa 5%,
          #f7f7f7 72%,
          #f2f2f2 86%,
          #f0f0f0 100%
        );
        box-shadow: inset 0 2px 7px rgba(143, 143, 143, 0.16);
        transition: all 0.3s ease;
        z-index: -1;
        margin: 2px;
      }

      .button:hover::before {
        top: 1px;
        left: 1px;
        right: 1px;
        bottom: 1px;
        margin: 5px;
      }

      .button:focus {
        outline: 2px solid #fefefe;
        box-shadow:
          9px 9px 44px #cecece3a,
          -9px -9px 44px #d3d3d33d,
          inset 0 0 0 2px rgba(192, 192, 192, 0.5);
      }

      .send-icon {
        margin-right: 5px;
        transition: transform 0.3s ease;
      }

      .button:hover .send-icon {
        transform: translateX(7px);
      }

      .button:focus .send-icon {
        transform: rotate(-40deg);
      }

      .system-msg {
        background: transparent !important;
        text-align: center;
        color: #666;
        font-style: italic;
        width: 100% !important;
        max-width: 100% !important;
      }
      .main-container {
        display: grid;
        justify-content: center;
        align-items: center;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: #2b2b2b; /* Matches your background */

        /* The alignment magic */
        display: flex;
        flex-direction: column; /* Stacks items vertically */
        /* Centers items vertically */
        align-items: center; /* Centers items horizontally */
        min-height: 100vh; /* Forces body to take full screen height */
        gap: 15px; /* Creates even spacing between your inputs */
      }

      h1 {
        color: white;
      }
      ul {
        border: 2px solid white;
        border-radius: 50px;
      }
      ul li {
        color: rgb(185, 78, 78);
        list-style-type: none;
        border: 2px solid white;
        padding: 14px;
        width: 200px;
        border-radius: 50px;
        margin: 10px;
        box-shadow: 0px 4px 10px 0px #c0abab9f;
      }
      #message-container {
        height: 400px; /* Adjust this height to fit your layout */
        overflow-y: auto; /* Adds the scrollbar when content exceeds the height */
        display: flex;
        flex-direction: column;
        padding: 30px;
        /* Optional: style the scrollbar for a better look */
        scrollbar-width: mone;
        -ms-overflow-style: none;
      }
      #message-container::-webkit-scrollbar {
        display: none; /* Hides the scrollbar in Webkit browsers */
      }
      #online-count{
        color: rgb(122, 206, 154);
        border: 2px solid green;
        padding: 10px;
      }
      </style>
  </head>
  <body>
    <h1>Global Chat</h1>
    <div id="online-count"> Online: 0</div>
    <div class="input-wrapper main-container">
      <input
        type="text"
        placeholder="username"
        id="username-input"
        class="input"
        required
      />
      <ul id="message-container"></ul>
      <input
        type="text"
        placeholder="Enter Your message"
        id="message-input"
        class="input"
      />
      <button id="message-button" class="button">
        <svg
          class="send-icon"
          xmlns="http://www.w3.org/2000/svg"
          width="48"
          height="48"
          viewBox="0 0 24 24"
        >
          <path
            fill="currentColor"
            fill-opacity="0.4"
            d="m16.066 10.184l-3.89-1.795c-2.154-.994-3.231-1.491-3.725-.982c-.493.509.038 1.572 1.101 3.698c.22.44.33.659.33.895s-.11.456-.33.895c-1.063 2.126-1.594 3.19-1.1 3.698c.493.51 1.57.012 3.725-.982l3.889-1.795c1.698-.784 2.548-1.176 2.548-1.816c0-.64-.85-1.032-2.549-1.816"
          ></path>
          <path
            fill="currentColor"
            d="M8.895 11.684L8.174 9.52a1 1 0 0 0-.707-.654l-1.78-.445a.8.8 0 0 0-.91 1.134l1.111 2.22a.5.5 0 0 1 0 .448l-1.11 2.22a.8.8 0 0 0 .91 1.134l1.78-.445a1 1 0 0 0 .706-.654l.72-2.163a1 1 0 0 0 0-.632"
          ></path>
        </svg>
        Send Message
      </button>
    </div>
    <script>
      // Selecting Dom elments
      const messageInput = document.getElementById("message-input");
      const messageBtn = document.getElementById("message-button");
      const messageContainer = document.getElementById("message-container");
      const usernameInput = document.getElementById("username-input");

      //render server
      const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      const connection = new WebSocket(
        `${wsProtocol}//${window.location.host}`,
      );
      //receiving msg
      connection.onopen = () => {
        connection.onmessage = (message) => {
          const parsedData = JSON.parse(message.data);

          console.log("Client received data:", parsedData);

          // 1. Handle the initial load of database history
          if (parsedData.type === "history") {
            const historyArray = parsedData.data;
            historyArray.forEach((msg) => {
              const li = document.createElement("li");
              // Note: Make sure your DB schema properties match these!
              li.innerText = `${msg.username} : ${msg.message} [${msg.timestamp}]`;
              messageContainer.appendChild(li);
            });
            messageContainer.scrollTop = messageContainer.scrollHeight;
          }
          // 2. Handle a single live chat message coming in
          else if (parsedData.type === "chat") {
            const text = parsedData.message;
            const username = parsedData.username;
            const li = document.createElement("li");
            li.innerText = `${username}:${text}   [${parsedData.timestamp}] `;
            messageContainer.appendChild(li);
            messageContainer.scrollTop = messageContainer.scrollHeight;
          } else if (parsedData.type === "userCount") {
            document.getElementById("online-count").innerText =`Online: ${parsedData.count}`;
          }
        };
        //Sending msg - sendMessage funtion
        function sendMessage() {
          const textValue = messageInput.value;
          const userValue = usernameInput.value;
          

          // preveting  empty text
          if (!textValue) return;

          const dataToSend = {
            type: "chat",
            username: userValue || "Anonymous",
            message: textValue,
            
          };

          connection.send(JSON.stringify(dataToSend));
          messageInput.value = "";
          messageInput.focus();
        }
        messageBtn.addEventListener("click", sendMessage);
        messageInput.addEventListener("keypress", (event) => {
          if (event.key === "Enter") {
            sendMessage();
          }
        });
      };
    </script>
  </body>
</html>
