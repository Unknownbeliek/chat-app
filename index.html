<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp</title>
</head>
<body>

    <h1>Global Chat</h1>
    <div>
        <input type="text"
               placeholder="username"         
               id="username-input"
        >
        <input
             type="text"
             placeholder="Enter Your message"
             id="message-input"               
        >
        <button id="message-button">
            send msg
        </button>
        <ul id="message-container">

        </ul>
    </div>
    <script>
        // Selecting Dom elments 
        const messageInput = document.getElementById('message-input');
        const messageBtn= document.getElementById('message-button');
        const messageContainer=document.getElementById('message-container');
        const usernameInput=document.getElementById('username-input')

        //render server
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const connection = new WebSocket(`${wsProtocol}//${window.location.host}`); 
        //receiving msg 
        connection.onopen = ()=>{
            connection.onmessage= (message)=>{
                console.log(`message recv..`,message);
                const rawData = message.data;
                const parsedData= JSON.parse(rawData);
                const text = parsedData.message
                const username =parsedData.username

                const li = document.createElement('li');
                li.innerText  = `${username} : ${text}`;
                messageContainer.appendChild(li);
                
            }
            //Sending msg - sendMessage funtion 
            function sendMessage(){
                const textValue = messageInput.value;
                const userValue = usernameInput.value;
                
                // preveting  empty text
                if(!textValue) return;
                
                const dataToSend = {
                    username : userValue,
                    message     : textValue
                }   
                
                connection.send(JSON.stringify(dataToSend));

                messageInput.value = '';
                
                messageInput.focus();

            }


            messageBtn.addEventListener('click',sendMessage);
            messageBtn.addEventListener('keypress' ,(ev)=>{
                if(event.key === 'enter'){
                    sendMessage();
                }
            });
        };
        </script>
</body>
</html>
