<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp</title>
</head>
<body>
    <h1>Hello World !!</h1>
    <div>
        <input
             type="text"
             placeholder="Enter Your message"
             id="message-input"               
        >
        <button id="message-button">
            send msg
        </button>
        <ul id="message-container">

        </ul>
    </div>
    <script>
        // Selecting Dom elments 
        const messageInput = document.getElementById('message-input');
        const messageBtn= document.getElementById('message-button');
        const messageContainer=document.getElementById('message-container');

        const { port }=window.location;
        const connection = new WebSocket(`ws://localhost:${port}`)
        connection.onopen = ()=>{
            connection.onmessage= (message)=>{
                console.log(`message recv..`,message);
                const rawData = message.data;
                const parsedData= JSON.parse(rawData);
                const text = parsedData.message

                const li = document.createElement('li');
                li.innerText  = text;
                messageContainer.appendChild(li);
                
            }
            messageBtn.addEventListener('click',(ev)=>{
                const value = messageInput.value;
                connection.send(JSON.stringify({message : value}));

            });
        };
    </script>
</body>
</html>
